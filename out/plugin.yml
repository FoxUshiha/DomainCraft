name: DomainCraft
version: 1.0
main: com.foxsrv.domain.DomainCraft
api-version: 1.20
depend: []
softdepend: [Vault]
author: FoxSRV
description: Domain system for custom craft in your server

commands:
  domain:
    description: Main DomainCraft command
    usage: /domain <create|set|edit|delete|list>
    aliases: [d]
    permission: domaincraft.use

permissions:
  domaincraft.use:
    description: Allows using domains
    default: true
  domaincraft.admin:
    description: Allows admin commands
    default: op
